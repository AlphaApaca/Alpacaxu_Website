      <h1 data-i18n="articleStack.title">机器人方向个人网站的技术栈选择</h1>
      <p class="article-lead" data-i18n="articleStack.lead">技术栈要服务研究记录、项目展示和文章发布，而不是一开始就追求复杂应用能力。</p>

      <article class="article-content">
        <h2 data-i18n="articleStack.h2a">适合 Astro 的情况</h2>
        <p data-i18n="articleStack.p1">如果网站以文章、项目展示和静态页面为主，Astro 很合适。它默认输出更轻，Markdown 内容管理也自然。</p>

        <h2 data-i18n="articleStack.h2b">适合 Next.js 的情况</h2>
        <p data-i18n="articleStack.p2">如果你计划加入登录、数据库、后台、复杂交互或产品化能力，Next.js 的扩展空间更大。</p>

        <h2 data-i18n="articleStack.h2c">我的建议</h2>
        <p data-i18n="articleStack.p3">个人博客第一版优先选择低维护方案。先把内容和设计跑通，再决定是否需要更重的应用框架。</p>
      </article>
