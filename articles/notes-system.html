      <h1 data-i18n="articleNotes.title">短笔记系统应该足够轻</h1>
      <p class="article-lead" data-i18n="articleNotes.lead">笔记系统的价值不是复杂分类，而是降低记录和回看的阻力。</p>

      <article class="article-content">
        <h2 data-i18n="articleNotes.h2a">先记录，再整理</h2>
        <p data-i18n="articleNotes.p1">不要让分类系统挡在输入之前。一个收集入口、一个每周整理节奏，通常比一套复杂标签更可靠。</p>

        <h2 data-i18n="articleNotes.h2b">公开输出要更小</h2>
        <p data-i18n="articleNotes.p2">短笔记可以只解决一个问题，解释一个概念，或者记录一个决策。小而完整的输出更容易形成习惯。</p>
      </article>
    </main>
